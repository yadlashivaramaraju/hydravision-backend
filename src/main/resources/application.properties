# ==========================================
# HYDRAVISION CLOUD BACKEND CONFIGURATION
# ==========================================

# 1. FILE UPLOAD LIMITS (Required for large billboard images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 2. THE CLOUDINARY VAULT (SECURED)
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

# 3. THE NEON POSTGRESQL DATABASE (SECURED)
spring.datasource.url=${NEON_DB_URL}
spring.datasource.username=${NEON_DB_USERNAME}
spring.datasource.password=${NEON_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 4. HIBERNATE (Automatic Table Generation)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true